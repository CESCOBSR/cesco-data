<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>떴,GO — 부산경남사업부</title>
<style>
:root{
  --navy:#16254C;--navy2:#1A3366;--blue:#1A6BCC;--blue-lt:#EEF4FF;
  --red:#C0392B;--red-lt:#FFF0EE;
  --gold:#E8A020;
  --card:#fff;--bg:#F4F6FA;--border:#E2E6EE;
  --text:#1A2236;--sub:#5A6682;
  --hd-h:0px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh}

/* ── 배너 ── */
.banner{width:100%;display:block;background:var(--navy);overflow:hidden;position:relative}
.banner img{width:100%;display:block;object-fit:cover}
.banner-fallback{background:linear-gradient(135deg,#16254C 0%,#1A3366 50%,#1A6BCC 100%);padding:28px 20px 22px;text-align:center}
.banner-fallback .bf-sub{font-size:10px;color:#93C5FD;letter-spacing:2.5px;font-weight:600;margin-bottom:8px}
.banner-fallback .bf-title{font-size:42px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.banner-fallback .bf-title span{color:#60A5FA}
.banner-fallback .bf-desc{font-size:11px;color:#93C5FD;margin-top:6px;font-style:italic}

/* ── sticky 헤더 영역 (권역탭+검색) ── */
.hd{position:sticky;top:0;z-index:100;background:var(--navy);box-shadow:0 2px 10px rgba(22,37,76,.25)}
.search-box{display:flex;align-items:center;gap:8px;padding:8px 12px 6px;background:rgba(255,255,255,.12);margin:0 10px 6px;border-radius:10px}
.search-box svg{flex-shrink:0;opacity:.8}
.search-box input{flex:1;background:none;border:none;outline:none;font-size:13px;color:#fff;caret-color:#60A5FA}
.search-box input::placeholder{color:rgba(255,255,255,.5)}
.group-tabs{display:flex;gap:4px;padding:4px 10px 8px;overflow-x:auto;scrollbar-width:none}
.group-tabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;color:rgba(255,255,255,.65);border:1.5px solid transparent;cursor:pointer;transition:.15s}
.gtab.on{color:#fff;border-color:#60A5FA;background:rgba(96,165,250,.18)}

/* ── 지사탭 sticky ── */
.branch-tabs{position:sticky;top:var(--hd-h,0px);z-index:90;display:flex;gap:5px;padding:7px 10px 6px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:.5px solid var(--border)}
.branch-tabs::-webkit-scrollbar{display:none}
.btab{flex-shrink:0;padding:4px 11px;border-radius:16px;font-size:11.5px;font-weight:500;color:var(--sub);border:1px solid var(--border);cursor:pointer;transition:.15s;white-space:nowrap}
.btab.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── 필터 칩 ── */
.chips-wrap{display:flex;gap:5px;padding:7px 10px 5px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:.5px solid var(--border)}
.chips-wrap::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 11px;border-radius:14px;font-size:11.5px;font-weight:500;color:var(--sub);border:1px solid var(--border);cursor:pointer;transition:.15s;white-space:nowrap;background:var(--card)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip.type-on{background:#1A4A8A;color:#fff;border-color:#1A4A8A}
.chip.sts-on{background:#065F46;color:#fff;border-color:#065F46}

/* ── 통계 바 ── */
.stats-bar{display:flex;gap:0;background:var(--card);border-bottom:.5px solid var(--border)}
.stat-item{flex:1;text-align:center;padding:7px 4px 5px;border-right:.5px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-val{font-size:15px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:9.5px;color:var(--sub);margin-top:1px}

/* ── 리스트 ── */
.list-wrap{padding:6px 8px 80px}
.sec-label{font-size:11px;font-weight:600;color:var(--sub);padding:8px 4px 4px;letter-spacing:.3px}

/* ── 카드 ── */
.card{background:var(--card);border-radius:12px;margin-bottom:7px;display:flex;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .1s,box-shadow .1s}
.card:active{transform:scale(.98);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.lbar{width:4px;flex-shrink:0}
.lbar.unvisit{background:#CBD5E0}
.lbar.visited{background:var(--blue)}
.lbar.revisit{background:var(--gold)}
.lbar.contract{background:#059669}
.ct{padding:9px 8px 4px 10px;flex:1;min-width:0}
.bname{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.cmeta{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:3px}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;background:#EEF4FF;color:#1A4A8A;font-weight:500;white-space:nowrap}
.dong-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:#F0F4FF;color:#3B5BDB;white-space:nowrap}
.new-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:#FEF9C3;color:#854D0E;font-weight:700;white-space:nowrap}

/* ── 🔴 레드존 배지 ── */
.redzone-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:#FFF0EE;color:#C0392B;font-weight:700;white-space:nowrap;border:1px solid #FFCDD2}

.odate{font-size:10px;color:var(--sub);white-space:nowrap}
.caddr{font-size:11px;color:var(--sub);padding-bottom:6px;padding-left:1px;display:flex;align-items:center;gap:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbot{padding:4px 10px 6px;border-top:.5px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.assignee-txt{font-size:11px;color:var(--blue);display:flex;align-items:center;gap:3px}
.memo-txt{font-size:11px;color:var(--sub)}

/* 진행상태 배지 */
.badge{font-size:10.5px;padding:2px 8px;border-radius:8px;font-weight:600;white-space:nowrap}
.badge-unvisit{background:#F1F5F9;color:#64748B}
.badge-visited{background:#EEF4FF;color:#1A4A8A}
.badge-revisit{background:#FFFBEB;color:#92400E}
.badge-contract{background:#ECFDF5;color:#065F46}
.card.dim{opacity:.5}

/* ── 상세 패널 ── */
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.18);z-index:200;transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto}
.panel.open{transform:translateX(-50%) translateY(0)}
.panel-handle{width:36px;height:4px;background:#E2E6EE;border-radius:2px;margin:10px auto 6px}
.panel-hd{padding:0 16px 10px;border-bottom:.5px solid var(--border)}
.p-name{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.p-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.panel-body{padding:14px 16px}
.p-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.p-label{font-size:11px;color:var(--sub);width:52px;flex-shrink:0;padding-top:1px}
.p-val{font-size:13px;color:var(--text);flex:1}
.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.sbtn{padding:9px;border-radius:10px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:.15s;background:var(--card);color:var(--sub)}
.sbtn.active-unvisit{border-color:#CBD5E0;background:#F8FAFC;color:#475569}
.sbtn.active-visited{border-color:var(--blue);background:#EEF4FF;color:var(--blue)}
.sbtn.active-revisit{border-color:var(--gold);background:#FFFBEB;color:#92400E}
.sbtn.active-contract{border-color:#059669;background:#ECFDF5;color:#065F46}
.assignee-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;outline:none;font-family:inherit;margin-top:4px}
.memo-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;outline:none;font-family:inherit;resize:none;height:70px;margin-top:4px}
.save-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;opacity:0;pointer-events:none;transition:opacity .28s}
.overlay.on{opacity:1;pointer-events:auto}
.empty{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.loading{text-align:center;padding:60px 20px;color:var(--sub);font-size:13px}
</style>
</head>
<body>

<!-- 배너 (banner.png 없으면 fallback) -->
<div class="banner" id="banner-wrap">
  <img src="banner.png" alt="떴,GO" onerror="this.parentElement.innerHTML=fallbackBanner()">
</div>

<!-- sticky 헤더 -->
<div class="hd" id="hd">
  <div class="search-box">
    <svg width="14" height="14" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="q" placeholder="업체명 · 주소 · 동 검색" oninput="render()">
  </div>
  <div class="group-tabs" id="group-tabs"></div>
</div>

<!-- 지사탭 (sticky, 헤더 아래) -->
<div class="branch-tabs" id="branch-tabs"></div>

<!-- 업종 칩 -->
<div class="chips-wrap" id="type-chips"></div>

<!-- 진행현황 칩 -->
<div class="chips-wrap" id="status-chips"></div>

<!-- 통계 바 -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-val" id="cnt-total">-</div><div class="stat-lbl">전체</div></div>
  <div class="stat-item"><div class="stat-val" id="cnt-unvisit">-</div><div class="stat-lbl">미방문</div></div>
  <div class="stat-item"><div class="stat-val" id="cnt-visited">-</div><div class="stat-lbl">방문완료</div></div>
  <div class="stat-item"><div class="stat-val" id="cnt-contract">-</div><div class="stat-lbl">계약완료</div></div>
  <div class="stat-item"><div class="stat-val" id="cnt-redzone" style="color:var(--red)">-</div><div class="stat-lbl">레드존</div></div>
</div>

<!-- 리스트 -->
<div class="list-wrap" id="list"><div class="loading">데이터 불러오는 중...</div></div>

<!-- 오버레이 + 상세 패널 -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-hd">
    <div class="p-name" id="p-name"></div>
    <div class="p-meta" id="p-meta"></div>
  </div>
  <div class="panel-body">
    <div class="p-row"><div class="p-label">주소</div><div class="p-val" id="p-addr"></div></div>
    <div class="p-row"><div class="p-label">개업일</div><div class="p-val" id="p-date"></div></div>
    <div class="p-row"><div class="p-label">지사</div><div class="p-val" id="p-branch"></div></div>
    <div style="margin-bottom:8px;font-size:12px;font-weight:600;color:var(--sub)">진행 현황</div>
    <div class="status-btns">
      <div class="sbtn" onclick="setStatus('미방문')">미방문</div>
      <div class="sbtn" onclick="setStatus('방문완료')">방문완료</div>
      <div class="sbtn" onclick="setStatus('재방문예정')">재방문예정</div>
      <div class="sbtn" onclick="setStatus('계약완료')">계약완료</div>
    </div>
    <div style="margin-top:10px;margin-bottom:4px;font-size:12px;font-weight:600;color:var(--sub)">담당자</div>
    <input class="assignee-input" id="p-assignee" placeholder="담당자 이름 입력">
    <div style="margin-top:10px;margin-bottom:4px;font-size:12px;font-weight:600;color:var(--sub)">메모</div>
    <textarea class="memo-input" id="p-memo" placeholder="방문 메모 입력..."></textarea>
    <button class="save-btn" onclick="savePanel()">저장</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// 레드존 데이터 (24개 지사)
// ─────────────────────────────────────────────
const REDZONE = [
  {branch:'거제통영지사', si:'거제시',  dong:'아주동'},
  {branch:'김해남부지사', si:'김해시',  dong:'외동'},
  {branch:'김해북부지사', si:'김해시',  dong:'삼계동'},
  {branch:'부산기장지사', si:'기장군',  dong:'기장읍'},
  {branch:'부산남부지사', si:'동구',    dong:'범일동'},
  {branch:'부산동래지사', si:'동래구',  dong:'온천동'},
  {branch:'부산북부지사', si:'북구',    dong:'화명동'},
  {branch:'부산사하지사', si:'서구',    dong:'암남동'},
  {branch:'부산서부지사', si:'강서구',  dong:'강동동'},
  {branch:'부산수영지사', si:'수영구',  dong:'광안동'},
  {branch:'부산진구지사', si:'부산진구',dong:'부전동'},
  {branch:'사천남해지사', si:'사천시',  dong:'용현면'},
  {branch:'양산지사',     si:'양산시',  dong:'동면'},
  {branch:'울산남부지사', si:'남구',    dong:'달동'},
  {branch:'울산북부지사', si:'북구',    dong:'진장동'},
  {branch:'울산서부지사', si:'울주군',  dong:'언양읍'},
  {branch:'울산중부지사', si:'동구',    dong:'방어동'},
  {branch:'진주동부지사', si:'거창군',  dong:'거창읍'},
  {branch:'진주서부지사', si:'진주시',  dong:'가좌동'},
  {branch:'창원남부지사', si:'창원시',  dong:'해운동'},
  {branch:'창원동부지사', si:'창원시',  dong:'상남동'},
  {branch:'창원북부지사', si:'창원시',  dong:'도계동'},
  {branch:'창원서부지사', si:'창원시',  dong:'합성동'},
  {branch:'해운대지사',   si:'해운대구',dong:'중동'},
];

// 주소 문자열로 레드존 여부 판단 (시/구/군 + 동 모두 매칭)
function isRedzone(addr) {
  if (!addr) return false;
  for (const r of REDZONE) {
    if (addr.includes(r.si) && addr.includes(r.dong)) return true;
    // 창원시 내 동 중복 방지: 시 없어도 동이 유니크하면 통과되나
    // si를 반드시 포함시켜 이중 체크
  }
  return false;
}

// ─────────────────────────────────────────────
// Firebase 설정 (기존 그대로)
// ─────────────────────────────────────────────
const FB_URL = 'https://cescobsr-default-rtdb.asia-southeast1.firebasedatabase.app';
const FB_USER_URL = FB_URL + '/user_data';

// 권역-지사 매핑
const GROUPS = {
  '전체': [],
  '부산동부': ['해운대지사','부산수영지사','부산동래지사','부산기장지사'],
  '부산서부': ['부산북부지사','부산남부지사','부산진구지사','부산사하지사','부산서부지사'],
  '울산·양산': ['울산남부지사','울산북부지사','울산중부지사','울산서부지사','양산지사'],
  '경남동부': ['거제통영지사','김해남부지사','김해북부지사'],
  '경남서부': ['진주동부지사','진주서부지사','창원동부지사','창원남부지사','창원북부지부','창원서부지사','사천남해지사'],
};

const TODAY = new Date().toISOString().slice(0,10);
const CUTOFF_NEW = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);

let DATA = {};
let USER = {};
let curGroup = '전체';
let curBranch = '전체';
let curType = '전체';
let curStatus = '전체';
let curId = null;

// 배너 fallback
function fallbackBanner() {
  return `<div class="banner-fallback">
    <div class="bf-sub">부산경남사업부</div>
    <div class="bf-title">떴<span>,</span>GO</div>
    <div class="bf-desc">신규는 빠를수록 내꺼!</div>
  </div>`;
}

// ─────────────────────────────────────────────
// Firebase 로드
// ─────────────────────────────────────────────
async function loadData() {
  try {
    const [r1, r2] = await Promise.all([
      fetch(FB_URL + '/cesco_data.json'),
      fetch(FB_USER_URL + '.json')
    ]);
    DATA = (await r1.json()) || {};
    USER = (await r2.json()) || {};
  } catch(e) {
    DATA = {}; USER = {};
  }
  mergeAndRender();
}

function getRecord(key) {
  const d = { ...DATA[key] };
  const u = USER[key] || {};
  d.status    = u.status    || d.status    || '미방문';
  d.assignee  = u.assignee  || '';
  d.memo      = u.memo      || '';
  d.contract  = u.contract  || d.contract  || '';
  d._i = key;
  return d;
}

function getFiltered() {
  const q = (document.getElementById('q')?.value || '').trim().toLowerCase();
  return Object.keys(DATA).map(k => getRecord(k)).filter(d => {
    if (curGroup !== '전체' && GROUPS[curGroup]?.length) {
      if (!GROUPS[curGroup].includes(d.branch)) return false;
    }
    if (curBranch !== '전체' && d.branch !== curBranch) return false;
    if (curType   !== '전체' && d.type   !== curType)   return false;
    if (curStatus !== '전체') {
      if (curStatus === '계약완료' && d.contract !== '계약완료') return false;
      else if (curStatus !== '계약완료' && d.status !== curStatus) return false;
    }
    if (q && !d.name?.toLowerCase().includes(q) && !(d.addr||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

// ─────────────────────────────────────────────
// 렌더링
// ─────────────────────────────────────────────
function mergeAndRender() {
  renderGroupTabs();
  renderBranchTabs();
  renderTypeChips();
  renderStatusChips();
  render();
  setHdHeight();
}

function setHdHeight() {
  const hd = document.getElementById('hd');
  if (hd) document.documentElement.style.setProperty('--hd-h', hd.offsetHeight + 'px');
}

function renderGroupTabs() {
  const el = document.getElementById('group-tabs');
  el.innerHTML = Object.keys(GROUPS).map(g =>
    `<div class="gtab${g===curGroup?' on':''}" onclick="selGroup('${g}')">${g}</div>`
  ).join('');
}

function renderBranchTabs() {
  const branches = curGroup==='전체'
    ? ['전체', ...new Set(Object.values(DATA).map(d=>d.branch).filter(Boolean).sort())]
    : ['전체', ...(GROUPS[curGroup]||[])];
  document.getElementById('branch-tabs').innerHTML = branches.map(b =>
    `<div class="btab${b===curBranch?' on':''}" onclick="selBranch('${b}')">${b}</div>`
  ).join('');
}

function renderTypeChips() {
  const types = ['전체', ...new Set(Object.values(DATA).map(d=>d.type).filter(Boolean).sort())];
  document.getElementById('type-chips').innerHTML = types.map(t =>
    `<div class="chip${t===curType?' type-on':''}" onclick="selType('${t}')">${t}</div>`
  ).join('');
}

function renderStatusChips() {
  const statuses = ['전체','미방문','방문완료','재방문예정','계약완료'];
  document.getElementById('status-chips').innerHTML = statuses.map(s =>
    `<div class="chip${s===curStatus?' sts-on':''}" onclick="selStatus('${s}')">${s}</div>`
  ).join('');
}

function render() {
  const list = getFiltered();
  list.sort((a,b) => (b.openDate||'').localeCompare(a.openDate||''));

  // 통계
  const rz = list.filter(d => isRedzone(d.addr));
  document.getElementById('cnt-total').textContent    = list.length;
  document.getElementById('cnt-unvisit').textContent  = list.filter(d=>d.status==='미방문').length;
  document.getElementById('cnt-visited').textContent  = list.filter(d=>d.status==='방문완료').length;
  document.getElementById('cnt-contract').textContent = list.filter(d=>d.contract==='계약완료').length;
  document.getElementById('cnt-redzone').textContent  = rz.length;

  const wrap = document.getElementById('list');
  if (!list.length) { wrap.innerHTML='<div class="empty">검색 결과가 없습니다</div>'; return; }

  const newItems = list.filter(d => d.openDate >= CUTOFF_NEW);
  const oldItems = list.filter(d => d.openDate <  CUTOFF_NEW);
  let html = '';
  if (newItems.length) html += `<div class="sec-label">신규 개업 (30일 이내) · ${newItems.length}건</div>` + newItems.map(cardHtml).join('');
  if (oldItems.length) html += `<div class="sec-label" style="margin-top:6px">이전 데이터 · ${oldItems.length}건</div>` + oldItems.map(cardHtml).join('');
  wrap.innerHTML = html;
}

function lbarClass(d) {
  if (d.contract==='계약완료') return 'contract';
  if (d.status==='방문완료')   return 'visited';
  if (d.status==='재방문예정') return 'revisit';
  return 'unvisit';
}
function badgeHtml(d) {
  if (d.contract==='계약완료') return '<span class="badge badge-contract">계약완료</span>';
  if (d.status==='방문완료')   return '<span class="badge badge-visited">방문완료</span>';
  if (d.status==='재방문예정') return '<span class="badge badge-revisit">재방문예정</span>';
  return '<span class="badge badge-unvisit">미방문</span>';
}

function cardHtml(d) {
  const key = d._i;
  const dim  = (d.contract==='계약완료') ? ' dim' : '';
  const isNew = d.openDate >= CUTOFF_NEW;
  const rzTag = isRedzone(d.addr) ? '<span class="redzone-tag">🔴레드존</span>' : '';
  const bot = (d.assignee||d.memo) ? `<div class="cbot">
    ${d.assignee?`<div class="assignee-txt"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>${d.assignee}</div>`:''}
    ${d.memo?`<div class="memo-txt">${d.memo}</div>`:''}
  </div>` : '';
  const safeKey = key.replace(/'/g,"\\'");
  return `<div class="card${dim}" onclick="openPanel('${safeKey}')">
    <div class="lbar ${lbarClass(d)}"></div>
    <div class="ct">
      <div class="bname">${d.name||''}</div>
      ${badgeHtml(d)}
      <div class="cmeta">
        <span class="tag">${d.type||''}</span>
        ${d.dong?`<span class="dong-tag">${d.dong}</span>`:''}
        ${rzTag}
        <span class="odate">개업 ${d.openDate||''}</span>
        ${isNew?'<span class="new-tag">NEW</span>':''}
      </div>
      <div class="caddr">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        ${d.addr||''}
      </div>
    </div>
    ${bot}
  </div>`;
}

// ─────────────────────────────────────────────
// 필터 선택
// ─────────────────────────────────────────────
function selGroup(g)  { curGroup=g; curBranch='전체'; mergeAndRender(); }
function selBranch(b) { curBranch=b; render(); document.querySelectorAll('.btab').forEach(el=>el.classList.toggle('on',el.textContent===b)); }
function selType(t)   { curType=t; render(); document.querySelectorAll('#type-chips .chip').forEach(el=>el.classList.toggle('type-on',el.textContent===t)); }
function selStatus(s) { curStatus=s; render(); document.querySelectorAll('#status-chips .chip').forEach(el=>el.classList.toggle('sts-on',el.textContent===s)); }

// ─────────────────────────────────────────────
// 상세 패널
// ─────────────────────────────────────────────
function openPanel(key) {
  curId = key;
  const d = getRecord(key);
  document.getElementById('p-name').textContent = d.name||'';
  const rzBadge = isRedzone(d.addr) ? '<span class="redzone-tag">🔴레드존</span>' : '';
  document.getElementById('p-meta').innerHTML =
    `${badgeHtml(d)}<span class="tag">${d.type||''}</span>${d.dong?`<span class="dong-tag">${d.dong}</span>`:''}`
    + rzBadge
    + (d.openDate>=CUTOFF_NEW?'<span class="new-tag">NEW</span>':'');
  document.getElementById('p-addr').textContent   = d.addr||'';
  document.getElementById('p-date').textContent   = d.openDate||'';
  document.getElementById('p-branch').textContent = d.branch||'';
  document.getElementById('p-assignee').value     = d.assignee||'';
  document.getElementById('p-memo').value         = d.memo||'';
  document.querySelectorAll('.sbtn').forEach(b => {
    b.className = 'sbtn';
    const map = {'미방문':'active-unvisit','방문완료':'active-visited','재방문예정':'active-revisit','계약완료':'active-contract'};
    if (b.textContent===d.status || (b.textContent==='계약완료'&&d.contract==='계약완료')) b.classList.add(map[b.textContent]||'');
  });
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

function setStatus(s) {
  document.querySelectorAll('.sbtn').forEach(b => {
    b.className = 'sbtn';
    const map = {'미방문':'active-unvisit','방문완료':'active-visited','재방문예정':'active-revisit','계약완료':'active-contract'};
    if (b.textContent===s) b.classList.add(map[s]||'');
  });
}

async function savePanel() {
  if (!curId) return;
  const activeSBtn = document.querySelector('.sbtn[class*="active"]');
  const status = activeSBtn ? activeSBtn.textContent : '미방문';
  const payload = {
    status:   status,
    contract: status==='계약완료'?'계약완료':'',
    assignee: document.getElementById('p-assignee').value.trim(),
    memo:     document.getElementById('p-memo').value.trim(),
    updatedAt: new Date().toISOString()
  };
  try {
    await fetch(`${FB_USER_URL}/${encodeURIComponent(curId)}.json`, {
      method:'PUT', body:JSON.stringify(payload)
    });
    USER[curId] = payload;
  } catch(e) { alert('저장 실패. 네트워크를 확인해주세요.'); return; }
  closePanel();
  render();
}

// ─────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────
window.addEventListener('load', () => {
  setHdHeight();
  loadData();
});
window.addEventListener('resize', setHdHeight);
</script>

</html>
